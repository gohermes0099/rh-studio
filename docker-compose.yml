# docker-compose.yml for RH-Studio
version: '3.8'

services:
  # RH-Studio Backend + Frontend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rh-studio-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    networks:
      - rh-studio-network

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: rh-studio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./data:/app/data:ro
    depends_on:
      - app
    networks:
      - rh-studio-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  rh-studio-network:
    driver: bridge